services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID}
        HOST_GID: ${HOST_GID}
        USERNAME: ${USERNAME}
    image: sandbox-fedora:44
    container_name: sandbox
    hostname: sandbox
    working_dir: /home/${USERNAME}/Code
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # GitHub fine-grained PAT (gh + git credential helper)
      GH_TOKEN: ${GH_TOKEN:-}
      # Commit identity (entrypoint writes ~/.gitconfig)
      GIT_USER_NAME: ${GIT_USER_NAME:-}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
    volumes:
      # :z is for SELinux hosts; Docker on macOS ignores it.
      - ${HOME}/Code:/home/${USERNAME}/Code:z
      # Skills live from the host; ~/.agents mounted so skill symlinks resolve.
      - ${HOME}/.claude/skills:/home/${USERNAME}/.claude/skills:z
      - ${HOME}/.agents:/home/${USERNAME}/.agents:z
      # Host-specific mounts go in docker-compose.override.yml (see .example).
    tty: true
    stdin_open: true
