services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # An unset var becomes an empty --build-arg that shadows the Dockerfile's
        # ARG default, failing deep inside useradd. Fail here instead.
        HOST_UID: ${HOST_UID:?unset — set it in .env to `id -u`}
        HOST_GID: ${HOST_GID:?unset — set it in .env to `id -g`}
        USERNAME: ${USERNAME:?unset — set it in .env to `whoami`}
    image: sandbox-fedora:44
    container_name: sandbox
    hostname: sandbox
    working_dir: /home/${USERNAME}/Code
    ports:
      # Loopback only — the no-auth sshd must never be reachable off-host
      - "127.0.0.1:${SANDBOX_SSH_PORT:-2222}:22"
    environment:
      # Fallback token. The claude() wrapper prefers refreshing from the
      # oauth-token store below when it is present.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Where the claude() wrapper reads the refresh_token from (mounted below).
      OAUTH_TOKEN_STORE: /home/${USERNAME}/.oauth-token/.tokens.json
      # GitHub fine-grained PAT (gh + git credential helper)
      GH_TOKEN: ${GH_TOKEN:-}
      # Commit identity (entrypoint writes ~/.gitconfig)
      GIT_USER_NAME: ${GIT_USER_NAME:-}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
      # Repos to copy into ~/Code, and dirs to skip while copying (see README)
      SANDBOX_REPOS: ${SANDBOX_REPOS:-}
      SANDBOX_COPY_EXCLUDES: ${SANDBOX_COPY_EXCLUDES:-}
      # jira-cli; project/board renamed inside — jira-cli treats JIRA_* env
      # as config overrides and a plain JIRA_PROJECT breaks its project object
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_SERVER: ${JIRA_SERVER:-}
      JIRA_LOGIN: ${JIRA_LOGIN:-}
      SANDBOX_JIRA_PROJECT: ${JIRA_PROJECT:-}
      SANDBOX_JIRA_BOARD: ${JIRA_BOARD:-}
    volumes:
      # :z is for SELinux hosts; Docker on macOS ignores it.
      # The entrypoint copies SANDBOX_REPOS from here into the container's ~/Code
      - ${HOME}/Code:/mnt/seed:ro,z
      # Skills copied in likewise; ~/.agents mounted so skill symlinks resolve
      - ${HOME}/.claude/skills:/mnt/skills:ro,z
      - ${HOME}/.agents:/home/${USERNAME}/.agents:ro,z
      # oauth-token tool + refresh_token store; rw so token rotation persists.
      - ./tools/oauth-token:/home/${USERNAME}/.oauth-token:z
      # ssh host keys, generated on first boot
      - ./tools/ssh:/mnt/ssh-host:z
      # Host-specific mounts go in docker-compose.override.yml (see .example).
    tty: true
    stdin_open: true
