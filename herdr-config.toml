onboarding = false

[terminal]
default_shell = "zsh"

[ui]
agent_panel_sort = "priority"
# Single-column layout threshold (default 64); raised for phone SSH clients
mobile_width_threshold = 100

[worktrees]
# Pin checkouts under a path pre-trusted in the image (see Dockerfile
# .claude.json) so Claude Code's statusLine + agent-state hook run inside
# worktrees. Checkouts land at <directory>/<repo>/<branch-slug>. This is also
# herdr's current default; pinning keeps it locked to the trusted path if the
# default ever changes.
directory = "~/.herdr/worktrees"
