onboarding = false

[terminal]
default_shell = "zsh"

[ui]
agent_panel_sort = "priority"
# Single-column layout threshold (default 64); raised for phone SSH clients
mobile_width_threshold = 100

[worktrees]
# Pre-trusted in the image (Dockerfile .claude.json) so statusLine/hooks run
# inside worktree checkouts
directory = "~/.herdr/worktrees"
